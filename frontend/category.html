<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>القسم - بوصلة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .navbar-glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .navbar-brand { font-weight: 800; color: #2563eb !important; font-size: 1.6rem; }
        
        /* خلفية القسم الداخلي (لون مختلف لتمييزه عن الرئيسية) */
       /* المسار: index.html inside <style> tag */

.hero-section {
    /* انسخ رابط الصورة اللي اخترتها فوق وحطها مكان (PASTE_LINK_HERE) */
    background-image: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.8)), url(https://images.unsplash.com/photo-1521587760476-6c12a4b040da?q=80&w=1600&auto=format&fit=crop);
    
    background-size: cover; /* عشان تفرد الصورة على العرض كله */
    background-position: center; /* عشان توطن الصورة */
    color: white; /* عشان الخط يفضل واضح */
    
    /* باقي الخصائص زي ما هي */
    padding: 100px 20px;
    text-align: center;
    border-radius: 0 0 40px 40px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    margin-bottom: 50px;
    position: relative;
    overflow: hidden;
}
        .hero-title { font-size: 3rem; font-weight: 800; margin-bottom: 1rem; color: #60a5fa; }
        .hero-subtitle { font-size: 1.2rem; opacity: 0.8; max-width: 600px; margin: 0 auto; }

        .article-card-hover { transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .article-card-hover:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        
        .custom-footer { background-color: #0f172a; color: #cbd5e1; padding: 60px 0 20px; margin-top: 80px; }
    </style>
</head>
<body>

 <nav class="navbar navbar-expand-lg navbar-glass sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="bi bi-compass-fill text-primary"></i> بوصلة
            </a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0 gap-3" id="publicCategories">
                    <li class="nav-item"><span class="nav-link text-muted">جاري تحميل الأقسام...</span></li>
                </ul>

                <div class="position-relative mx-lg-4 my-2 my-lg-0 flex-grow-1" style="max-width: 400px;">
                    <input type="text" id="searchInput" class="form-control rounded-pill pe-4" placeholder="ابحث عن مقال أو قسم..." autocomplete="off" style="background-color: #f1f5f9; border: 1px solid #e2e8f0;">
                    <i class="bi bi-search position-absolute top-50 end-0 translate-middle-y me-3 text-muted"></i>
                    
                    <div id="searchResults" class="dropdown-menu w-100 shadow-lg border-0 mt-2 rounded-4 p-2" style="display: none; position: absolute; max-height: 400px; overflow-y: auto; z-index: 1050; text-align: right;">
                        </div>
                </div>

                <div class="d-flex align-items-center gap-3 mt-2 mt-lg-0">
                    <a href="index.html" class="btn btn-outline-primary btn-sm rounded-pill px-4 fw-bold">الرئيسية</a>
                </div>
            </div>
        </div>
    </nav>



    <section class="hero-section">
        <div class="container">
            <h1 id="categoryNameTitle" class="hero-title">جاري التحميل... <i class="bi bi-folder2-open"></i></h1>
            <p id="categoryDescTitle" class="hero-subtitle"></p>
        </div>
    </section>

    <main class="container">
        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4" id="categoryArticlesGrid">
            </div>
    </main>

    <footer class="custom-footer text-center">
        <p class="mb-0">&copy; 2026 منصة بوصلة. جميع الحقوق محفوظة.</p>
    </footer>

    <script src="./js/public_category.js"></script> 

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/lang.js"></script>
    <script src="./js/main.js"></script> 
    
    <script src="./js/search.js"></script> 
</body>
</html>
