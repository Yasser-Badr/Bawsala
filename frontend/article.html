<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قراءة المقال - بوصلة</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    
    <style>
        :root {
            --primary-color: #2563eb;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --bg-light: #f8fafc;
        }
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }
        
        /* الناف بار بتأثير الزجاج الشفاف */
        .navbar-glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .navbar-brand {
            font-weight: 800;
            color: var(--primary-color) !important;
            font-size: 1.6rem;
        }
        
        /* رأس المقال (العنوان والقسم) */
        .article-header {
            max-width: 800px;
            margin: 0 auto;
            padding: 4rem 1rem 2.5rem;
        }
        .category-badge {
            background-color: rgba(37, 99, 235, 0.1);
            color: var(--primary-color);
            font-weight: bold;
            padding: 0.6em 1.2em;
            border-radius: 50px;
            font-size: 0.95rem;
            display: inline-block;
            margin-bottom: 1rem;
        }
        .article-title {
            font-size: 3rem;
            font-weight: 800;
            line-height: 1.4;
            color: #0f172a;
        }
        .article-meta {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            color: var(--text-muted);
            margin-top: 1.5rem;
            font-size: 1.1rem;
        }
        
        /* حاوية صورة الغلاف العملاقة */
        .hero-image-container {
            max-width: 1000px;
            margin: 0 auto 3rem;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }
        .hero-image {
            width: 100%;
            height: 500px;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        .hero-image:hover {
            transform: scale(1.02);
        }

        /* كارت محتوى المقال */
        .article-content {
            max-width: 800px;
            margin: -6rem auto 4rem; /* مسحوب لفوق عشان يغطي جزء من الصورة */
            background: white;
            padding: 4rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            font-size: 1.25rem;
            line-height: 2.1;
            color: #334155;
            position: relative;
            z-index: 10;
        }
        .article-content h1, .article-content h2, .article-content h3 {
            color: #0f172a;
            font-weight: 800;
            margin-top: 2.5rem;
            margin-bottom: 1.2rem;
            line-height: 1.5;
        }
        .article-content img {
            max-width: 100%;
            border-radius: 12px;
            margin: 2.5rem 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .article-content a {
            color: var(--primary-color);
            text-decoration: none;
            border-bottom: 2px solid rgba(37, 99, 235, 0.3);
            transition: 0.3s;
        }
        .article-content a:hover {
            border-bottom-color: var(--primary-color);
        }

        /* الموبايل */
        @media (max-width: 768px) {
            .article-title { font-size: 2.2rem; }
            .hero-image { height: 300px; border-radius: 12px; }
            .article-content { padding: 2rem 1.5rem; font-size: 1.15rem; margin-top: -3rem; border-radius: 16px; }
        }
    </style>
</head>
<body>

   <nav class="navbar navbar-expand-lg navbar-glass sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="bi bi-compass-fill text-primary"></i> بوصلة
            </a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0 gap-3" id="publicCategories">
                    <li class="nav-item"><span class="nav-link text-muted">جاري تحميل الأقسام...</span></li>
                </ul>

                <div class="position-relative mx-lg-4 my-2 my-lg-0 flex-grow-1" style="max-width: 400px;">
                    <input type="text" id="searchInput" class="form-control rounded-pill pe-4" placeholder="ابحث عن مقال أو قسم..." autocomplete="off" style="background-color: #f1f5f9; border: 1px solid #e2e8f0;">
                    <i class="bi bi-search position-absolute top-50 end-0 translate-middle-y me-3 text-muted"></i>
                    
                    <div id="searchResults" class="dropdown-menu w-100 shadow-lg border-0 mt-2 rounded-4 p-2" style="display: none; position: absolute; max-height: 400px; overflow-y: auto; z-index: 1050; text-align: right;">
                        </div>
                </div>

                <div class="d-flex align-items-center gap-3 mt-2 mt-lg-0">
                    <a href="index.html" class="btn btn-outline-primary btn-sm rounded-pill px-4 fw-bold">الرئيسية</a>
                </div>
            </div>
        </div>
    </nav>


    <main class="pb-5">
        <div id="loadingMessage" class="text-center py-5 mt-5 text-muted">
            <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;"></div>
            <h4 class="mt-4 fw-bold">جاري تجهيز المقال...</h4>
        </div>

        <div id="articleWrapper" style="display: none;">
            
            <header class="article-header text-center">
                <span id="articleCategory" class="category-badge">...</span>
                <h1 id="articleTitle" class="article-title">...</h1>
                <div class="article-meta">
                    <span id="articleDate"><i class="bi bi-calendar3"></i> ...</span>
                    <span>•</span>
                    <span id="articleViews"><i class="bi bi-eye"></i> ...</span>
                </div>
            </header>

            <div class="container px-3">
                <div class="hero-image-container">
                    <img id="articleHeroImage" src="" alt="Cover" class="hero-image">
                </div>
            </div>

            <div class="container px-3">
                <article id="articleContent" class="article-content">
                    </article>
            </div>

        </div>
    </main>

    <script src="./js/article.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/lang.js"></script>
    <script src="./js/main.js"></script> 
    
    <script src="./js/search.js"></script> 
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
</body>
</html>
