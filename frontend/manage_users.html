<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المستخدمين - بوصلة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="dashboard-layout">
        
        <aside class="sidebar">
            <h2 data-i18n="dashboard_title">بوصلة 🧭</h2>
            <ul>
                <li><a href="admin.html">🏠 الرئيسية</a></li>
                <li><a href="manage_articles.html">📝 إدارة المقالات</a></li>
                <li><a href="add_article.html">✍️ إضافة مقال</a></li>
                <li><a href="manage_categories.html">📁 إدارة الأقسام</a></li>
                <li><a href="add_category.html">➕ إضافة قسم</a></li>
                <li id="assignLink" style="display: none;"><a href="manage_users.html" class="active">👥 إدارة الصلاحيات</a></li>
            </ul>
            <div class="logout-container" style="margin-top: auto; padding-top: 20px; border-top: 1px solid var(--border-color);">
                <button onclick="logoutAdmin()" class="btn btn-full" style="background-color: #ef4444; margin-top: 0;">🚪 تسجيل الخروج</button>
            </div>
        </aside>

        <main class="main-content">
            <div style="display: flex; gap: 30px; align-items: flex-start; flex-wrap: wrap;">
                
                <div class="editor-card" style="flex: 1; min-width: 300px; margin: 0;">
                    <h2 style="color: var(--primary-color); margin-bottom: 25px;">إضافة محرر جديد</h2>
                    <form id="addUserForm">
                        <div class="input-group">
                            <label>الاسم</label>
                            <input type="text" id="userName" required>
                        </div>
                        <div class="input-group">
                            <label>البريد الإلكتروني</label>
                            <input type="email" id="userEmail" required>
                        </div>
                        <div class="input-group">
                            <label>كلمة المرور</label>
                            <input type="password" id="userPassword" required minlength="6">
                        </div>
                        <div class="input-group">
                            <label>الرتبة</label>
                            <select id="userRole" required>
                                <option value="editor">محرر (Editor)</option>
                                <option value="superadmin">مدير عام (Superadmin)</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-full">إنشاء الحساب</button>
                    </form>
                </div>

                <div class="editor-card" style="flex: 1; min-width: 300px; margin: 0;">
                    <h2 style="color: var(--primary-color); margin-bottom: 25px;">إعطاء صلاحية لقسم</h2>
                    <form id="assignCategoryForm">
                        <div class="input-group">
                            <label>اختر المحرر</label>
                            <select id="editorSelect" required>
                                <option value="">جاري التحميل...</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>اختر القسم</label>
                            <select id="categorySelect" required>
                                <option value="">جاري التحميل...</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-full" style="background-color: #f39c12;">تفعيل الصلاحية</button>
                    </form>
                </div>

            </div>
        </main>
    </div>

    <script src="./js/lang.js"></script>
    <script src="./js/manage_users.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/admin_guard.js"></script>
</body>
</html>
