<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="manage_articles_title">إدارة المقالات - بوصلة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <h2 data-i18n="dashboard_title">بوصلة 🧭</h2>
            <ul>
                <li><a href="admin.html">🏠 الرئيسية</a></li>
                <li><a href="manage_articles.html" class="active">📝 إدارة المقالات</a></li>
                <li><a href="add_article.html">✍️ إضافة مقال</a></li>
                <li><a href="manage_categories.html">📁 إدارة الأقسام</a></li>
                <li><a href="add_category.html">➕ إضافة قسم</a></li>
                <li id="assignLink" style="display: none;"><a href="manage_users.html">👥 إدارة الصلاحيات</a></li>
            </ul>
            <div class="logout-container" style="margin-top: auto; padding-top: 20px; border-top: 1px solid var(--border-color);">
                <button onclick="logoutAdmin()" class="btn btn-full" style="background-color: #ef4444; margin-top: 0;">🚪 تسجيل الخروج</button>
            </div>
        </aside>

        <main class="main-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                <h2 style="color: var(--primary-color);">إدارة المقالات</h2>
                <a href="add_article.html" class="btn">إضافة مقال جديد +</a>
            </div>
            
            <div class="table-container">
                <p id="loadingMsg" style="text-align: center; color: var(--text-secondary); padding: 20px;">جاري تحميل المقالات...</p>
                <table class="admin-table" id="articlesTable" style="display: none;">
                    <thead>
                        <tr>
                            <th>العنوان</th>
                            <th>القسم</th>
                            <th>المشاهدات</th>
                            <th>التاريخ</th>
                            <th>الإجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="articlesTableBody"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script src="./js/lang.js"></script>
    <script src="./js/manage_articles.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/admin_guard.js"></script>
</body>
</html>
