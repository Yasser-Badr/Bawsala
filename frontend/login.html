<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="login_title">تسجيل الدخول - بوصلة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">

    <div class="login-container">
        <div class="login-card">
            <h2 data-i18n="login_header" style="text-align: center; color: var(--primary-color); margin-bottom: 30px;">
                تسجيل الدخول للوحة التحكم
            </h2>
            
            <form id="loginForm">
                <div class="input-group">
                    <label data-i18n="email">البريد الإلكتروني</label>
                    <input type="email" id="email" required placeholder="admin@bawsala.com">
                </div>
                
                <div class="input-group">
                    <label data-i18n="password">كلمة المرور</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                
                <div id="errorMessage" class="error-message" style="display: none;"></div>
                
                <button type="submit" class="btn btn-full" data-i18n="login_btn">دخول</button>
            </form>
        </div>
    </div>

    <script src="./js/lang.js"></script>
    <script src="./js/auth.js"></script>
</body>
</html>
