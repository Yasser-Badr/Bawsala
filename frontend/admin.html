<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - بوصلة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <h2 data-i18n="dashboard_title">بوصلة 🧭</h2>
            <ul>
                <li><a href="admin.html" class="active">🏠 الرئيسية</a></li>
                <li><a href="manage_articles.html">📝 إدارة المقالات</a></li>
                <li><a href="add_article.html">✍️ إضافة مقال</a></li>

            </ul>
            <div class="logout-container" style="margin-top: auto; padding-top: 20px; border-top: 1px solid var(--border-color);">

            </div>
        </aside>

        <main class="main-content">

                <h1 style="color: var(--primary-color); font-size: 32px; margin-bottom: 15px;">
                    <span data-i18n="welcome">مرحباً بك يا</span> 
                    <span class="admin-name-display" style="color: var(--text-primary); font-weight: bold;">أدمن</span>

                <p style="color: var(--text-secondary); font-size: 18px; margin-bottom: 30px;">

                </p>
                <div style="display: flex; gap: 15px; justify-content: center;">
                    <a href="add_article.html" class="btn">إضافة مقال جديد ✍️</a>
                    <a href="manage_articles.html" class="btn btn-outline">إدارة المقالات 📝</a>
                </div>
            </div>
        </main>
    </div>

    <script src="./js/lang.js"></script>
    <script src="./js/auth.js"></script>
